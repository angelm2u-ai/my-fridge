<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 冰友 - 您的生活提案補貨助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFCFB;
            color: #2C3E35;
        }

        .serif-title {
            font-family: 'Lora', 'Noto Sans TC', serif;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            height: 280px;
        }

        .tab-active {
            background-color: #4E6E58 !important;
            color: white !important;
            border-color: #4E6E58 !important;
            box-shadow: 0 10px 15px -3px rgba(78, 110, 88, 0.2);
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            border-color: #4E6E58;
        }
    </style>
</head>
<body class="selection:bg-[#EAEFEA]">

    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-[#E6E1D8]">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🥦</span>
                <div>
                    <h1 class="text-xl font-bold tracking-tight serif-title">AI 冰友</h1>
                    <p class="text-[10px] text-[#8C9B8E] tracking-widest uppercase font-medium">Smart Fridge Life Planner</p>
                </div>
            </div>
            <div class="flex items-center gap-2 bg-[#F8F7F2] px-4 py-1.5 rounded-full border border-[#E6E1D8]">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#4E6E58] opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-[#4E6E58]"></span>
                </span>
                <span class="text-[11px] font-bold text-[#4E6E58]">生活提案模組已就緒</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        
        <!-- 生活提案情境選擇 -->
        <section class="mb-12">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold mb-2 serif-title">今天是什麼樣的生活提案？</h2>
                <p class="text-sm text-[#7A8A7E]">選擇一個情境，讓 AI 冰友為您計算最精準的備餐需求。</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <button onclick="selectPersona('daily')" id="btn-daily" class="scenario-card p-8 rounded-3xl bg-white border border-[#E6E1D8] text-left card-hover tab-active">
                    <span class="text-4xl block mb-4">🏠</span>
                    <h3 class="font-bold text-lg mb-1">主婦日常</h3>
                    <p class="text-xs opacity-80 leading-relaxed">追求全家人的營養均衡，確保基礎食材如雞蛋、牛奶、鮮蔬維持在水位之上。</p>
                </button>
                <button onclick="selectPersona('fitness')" id="btn-fitness" class="scenario-card p-8 rounded-3xl bg-white border border-[#E6E1D8] text-left card-hover">
                    <span class="text-4xl block mb-4">💪</span>
                    <h3 class="font-bold text-lg mb-1">增肌減脂</h3>
                    <p class="text-xs text-[#7A8A7E] leading-relaxed">以高蛋白質與低GI原型食物為核心，精準監控肉類與纖維存貨，拒絕精緻加工。</p>
                </button>
                <button onclick="selectPersona('party')" id="btn-party" class="scenario-card p-8 rounded-3xl bg-white border border-[#E6E1D8] text-left card-hover">
                    <span class="text-4xl block mb-4">🥳</span>
                    <h3 class="font-bold text-lg mb-1">派對準備</h3>
                    <p class="text-xs text-[#7A8A7E] leading-relaxed">歡聚好夥伴！自動權衡派對點心、酒精飲料與冷盤食材，迎接多位客人的挑戰。</p>
                </button>
            </div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <!-- 左欄：配置區 -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-[#E6E1D8] shadow-sm">
                    <h3 class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#8C9B8E] mb-6 flex items-center gap-2">
                        <span>⚙️</span> 配置與人數
                    </h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold mb-3 text-[#4E6E58]">預計備餐人數</label>
                            <div class="flex items-center gap-4 bg-[#F8F7F2] p-2 rounded-2xl border border-[#E6E1D8]">
                                <button onclick="updatePeople(-1)" class="w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow-sm hover:bg-[#EAEFEA] transition-colors">-</button>
                                <div class="flex-1 text-center font-bold text-xl"><span id="people-count">2</span> <span class="text-xs font-normal">人</span></div>
                                <button onclick="updatePeople(1)" class="w-12 h-12 rounded-xl bg-white flex items-center justify-center shadow-sm hover:bg-[#EAEFEA] transition-colors">+</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold mb-3 text-[#4E6E58]">當前情境必備食材</label>
                            <div id="persona-tags" class="flex flex-wrap gap-2">
                                <!-- JS 動態渲染 -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-[#E6E1D8] shadow-sm">
                    <h3 class="text-[11px] font-bold uppercase tracking-[0.2em] text-[#8C9B8E] mb-4 flex items-center gap-2">
                        <span>📷</span> 冰箱視點上傳
                    </h3>
                    <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-[#E6E1D8] rounded-2xl p-10 text-center cursor-pointer hover:bg-[#F8F7F2] hover:border-[#4E6E58] transition-all">
                        <input id="file-input" type="file" multiple class="hidden" onchange="handleImage(event)">
                        <span class="text-4xl block mb-2">📸</span>
                        <p class="text-xs font-bold">點擊上傳冰箱全景照</p>
                        <p class="text-[10px] text-[#A69C8E] mt-1">AI 冰友將根據影像進行盤點</p>
                    </div>
                    <div id="preview-grid" class="grid grid-cols-3 gap-2 mt-4 hidden"></div>
                    
                    <button onclick="startAnalysis()" id="btn-scan" class="w-full mt-6 bg-[#2C3E35] text-white font-bold py-4 rounded-2xl hover:bg-[#3D5544] transition-all text-xs tracking-[0.3em] uppercase">
                        開始智能生活分析
                    </button>
                </div>
            </div>

            <!-- 右欄：分析結果 -->
            <div class="lg:col-span-8">
                <div class="bg-white p-8 rounded-3xl border border-[#E6E1D8] shadow-sm min-h-[650px]">
                    
                    <div id="result-empty" class="py-32 text-center opacity-30">
                        <div class="text-6xl mb-6">🥙</div>
                        <h3 class="font-bold text-sm tracking-widest">待分析資料</h3>
                        <p class="text-xs mt-2">請於左側設定情境並上傳冰箱照片</p>
                    </div>

                    <div id="result-loading" class="hidden py-40 text-center">
                        <div class="inline-block w-10 h-10 border-4 border-[#4E6E58] border-t-transparent rounded-full animate-spin mb-6"></div>
                        <p class="text-xs font-bold tracking-widest text-[#4E6E58]">正在分析冰箱環境並媒合提案...</p>
                    </div>

                    <div id="result-content" class="hidden space-y-12">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="p-6 bg-[#F8F7F2] rounded-3xl border border-[#E6E1D8]">
                                <h4 class="text-[11px] font-bold text-[#4E6E58] uppercase tracking-[0.15em] mb-4">🥗 冰箱均衡度分析</h4>
                                <div class="chart-container">
                                    <canvas id="chart-balance"></canvas>
                                </div>
                            </div>

                            <div class="p-6 bg-[#F8F7F2] rounded-3xl border border-[#E6E1D8]">
                                <h4 class="text-[11px] font-bold text-[#4E6E58] uppercase tracking-[0.15em] mb-4">🚨 補貨急迫性 (AI 建議)</h4>
                                <div class="chart-container">
                                    <canvas id="chart-urgency"></canvas>
                                </div>
                            </div>
                        </div>

                        <div>
                            <div class="flex items-center justify-between mb-6">
                                <h4 class="text-[11px] font-bold text-[#2C3E35] uppercase tracking-[0.15em]">🛒 智能採買清單</h4>
                                <button onclick="copyToLINE()" class="text-[11px] bg-[#EAEFEA] text-[#4E6E58] px-4 py-1.5 rounded-full font-bold hover:bg-[#D1D9D1] transition-colors border border-[#D1D9D1]">
                                    複製至 LINE (格式化)
                                </button>
                            </div>
                            <div id="shopping-list" class="grid grid-cols-1 gap-3">
                                <!-- 清單由 JS 生成 -->
                            </div>
                        </div>

                        <div class="pt-8 border-t border-[#F0EBE3]">
                            <div class="flex justify-between items-center mb-4 text-[10px] font-bold tracking-widest">
                                <span>當前提案執行進度</span>
                                <span id="progress-val" class="text-[#4E6E58]">0%</span>
                            </div>
                            <div class="w-full bg-[#F0EBE3] h-1.5 rounded-full overflow-hidden">
                                <div id="progress-bar" class="bg-[#4E6E58] h-full transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#2C3E35] text-white px-8 py-3 rounded-xl shadow-2xl transition-all translate-y-20 opacity-0 z-[100] text-xs font-bold flex items-center gap-3">
        <span id="toast-icon">✨</span>
        <span id="toast-msg">訊息已複製</span>
    </div>

    <script>
        // --- 核心狀態 ---
        let appState = {
            currentPersona: 'daily',
            peopleCount: 2,
            mustHaves: {
                daily: ["雞蛋", "鮮奶", "當季蔬菜", "板豆腐", "洋蔥", "白米"],
                fitness: ["雞胸肉", "水煮蛋", "地瓜", "西蘭花", "酪梨", "希臘優格"],
                party: ["精釀啤酒", "氣泡飲", "切達起司", "綜合堅果", "火腿冷盤", "新鮮水果"]
            },
            images: [],
            charts: { balance: null, urgency: null },
            shoppingItems: []
        };

        // --- 初始化載入 ---
        window.onload = () => {
            renderPersonaTags();
        };

        // --- 交互邏輯 ---
        function selectPersona(p) {
            appState.currentPersona = p;
            
            // 更新 UI 選卡狀態
            document.querySelectorAll('.scenario-card').forEach(c => {
                c.classList.remove('tab-active');
                c.querySelector('p').classList.add('text-[#7A8A7E]');
            });
            const active = document.getElementById(`btn-${p}`);
            active.classList.add('tab-active');
            active.querySelector('p').classList.remove('text-[#7A8A7E]');
            
            renderPersonaTags();
            showToast(`已切換至「${active.querySelector('h3').innerText}」提案`, "🏠");
        }

        function updatePeople(delta) {
            appState.peopleCount = Math.max(1, Math.min(30, appState.peopleCount + delta));
            document.getElementById('people-count').innerText = appState.peopleCount;
        }

        function renderPersonaTags() {
            const container = document.getElementById('persona-tags');
            container.innerHTML = '';
            appState.mustHaves[appState.currentPersona].forEach(item => {
                const tag = document.createElement('div');
                tag.className = "bg-[#F8F7F2] border border-[#E6E1D8] px-3 py-1.5 rounded-xl text-[10px] font-bold text-[#4E6E58]";
                tag.innerText = item;
                container.appendChild(tag);
            });
        }

        function handleImage(e) {
            const files = Array.from(e.target.files);
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';
            grid.classList.remove('hidden');
            
            files.slice(0, 3).forEach(f => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    appState.images.push(ev.target.result);
                    const div = document.createElement('div');
                    div.className = "aspect-square rounded-xl border border-[#E6E1D8] overflow-hidden";
                    div.innerHTML = `<img src="${ev.target.result}" class="w-full h-full object-cover">`;
                    grid.appendChild(div);
                };
                reader.readAsDataURL(f);
            });
        }

        // --- 分析與渲染 ---
        function startAnalysis() {
            if (appState.images.length === 0) {
                showToast("請先上傳冰箱照片", "📷");
                return;
            }

            document.getElementById('result-empty').classList.add('hidden');
            document.getElementById('result-loading').classList.remove('hidden');
            document.getElementById('result-content').classList.add('hidden');

            setTimeout(() => {
                const data = mockAnalysisData();
                renderVisuals(data);
                document.getElementById('result-loading').classList.add('hidden');
                document.getElementById('result-content').classList.remove('hidden');
                showToast("分析完成！已產出補貨建議", "✅");
            }, 1800);
        }

        function mockAnalysisData() {
            let balance = { protein: 25, veg: 30, carb: 35, other: 10 };
            let shopping = [];

            if (appState.currentPersona === 'daily') {
                balance = { protein: 20, veg: 40, carb: 30, other: 10 };
                shopping = [
                    { name: "雞蛋", category: "蛋白質", urgent: 95, reason: `常備清單紅燈，針對 ${appState.peopleCount} 人日常需求量嚴重不足。` },
                    { name: "全脂鮮乳", category: "乳製品", urgent: 75, reason: "掃描顯示瓶身容量低於 20%，建議盡快補貨。" },
                    { name: "季節葉菜", category: "蔬菜", urgent: 60, reason: "保鮮室僅剩少量洋蔥，建議補充綠色纖維。" }
                ];
            } else if (appState.currentPersona === 'fitness') {
                balance = { protein: 50, veg: 35, carb: 10, other: 5 };
                shopping = [
                    { name: "雞胸肉", category: "優質蛋白", urgent: 98, reason: `增肌情境核心，目前的份量不足以應付 ${appState.peopleCount} 人份的餐期。` },
                    { name: "希臘優格", category: "蛋白質", urgent: 85, reason: "標籤辨識顯示已達有效期限臨界點，建議汰換更新。" }
                ];
            } else {
                balance = { protein: 15, veg: 15, carb: 20, other: 50 };
                shopping = [
                    { name: "精釀啤酒 (12入)", category: "飲品", urgent: 100, reason: `針對 ${appState.peopleCount} 位客人的派對計畫，冰箱目前無存貨。` },
                    { name: "起司拼盤", category: "零食", urgent: 90, reason: "派對必備提案，冷藏庫目前缺乏冷盤食材。" }
                ];
            }
            return { balance, shopping };
        }

        function renderVisuals(data) {
            // Doughnut Chart
            const ctxB = document.getElementById('chart-balance').getContext('2d');
            if (appState.charts.balance) appState.charts.balance.destroy();
            appState.charts.balance = new Chart(ctxB, {
                type: 'doughnut',
                data: {
                    labels: ['蛋白質', '蔬菜', '碳水', '其他'],
                    datasets: [{
                        data: Object.values(data.balance),
                        backgroundColor: ['#4E6E58', '#8C9B8E', '#D1D9D1', '#F0EBE3'],
                        borderWidth: 0
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });

            // Bar Chart
            const ctxU = document.getElementById('chart-urgency').getContext('2d');
            if (appState.charts.urgency) appState.charts.urgency.destroy();
            appState.charts.urgency = new Chart(ctxU, {
                type: 'bar',
                data: {
                    labels: data.shopping.map(i => i.name),
                    datasets: [{
                        data: data.shopping.map(i => i.urgent),
                        backgroundColor: data.shopping.map(i => i.urgent > 80 ? '#C68E8E' : '#4E6E58'),
                        borderRadius: 6
                    }]
                },
                options: {
                    indexAxis: 'y',
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { max: 100, display: false }, y: { grid: { display: false } } }
                }
            });

            appState.shoppingItems = data.shopping.map(i => ({ ...i, checked: false }));
            renderListUI();
        }

        function renderListUI() {
            const container = document.getElementById('shopping-list');
            container.innerHTML = '';
            appState.shoppingItems.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = `p-5 rounded-2xl border transition-all cursor-pointer flex items-center gap-4 ${item.checked ? 'bg-[#F8F7F2] opacity-50 grayscale' : 'bg-white border-[#E6E1D8] hover:border-[#4E6E58]'}`;
                card.onclick = () => {
                    item.checked = !item.checked;
                    renderListUI();
                };
                card.innerHTML = `
                    <div class="w-6 h-6 rounded-lg border-2 flex-shrink-0 ${item.checked ? 'bg-[#4E6E58] border-[#4E6E58]' : 'border-[#D1D9D1]'} flex items-center justify-center">
                        ${item.checked ? '<span class="text-white text-xs">✓</span>' : ''}
                    </div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="font-bold text-xs">${item.name}</span>
                            <span class="text-[9px] px-2 py-0.5 rounded-full font-bold ${item.urgent > 80 ? 'bg-red-50 text-red-500' : 'bg-[#EAEFEA] text-[#4E6E58]'}">急迫性 ${item.urgent}%</span>
                        </div>
                        <p class="text-[10px] text-[#8C9B8E] font-medium leading-relaxed">${item.reason}</p>
                    </div>
                `;
                container.appendChild(card);
            });
            updateProgress();
        }

        function updateProgress() {
            const total = appState.shoppingItems.length;
            const checked = appState.shoppingItems.filter(i => i.checked).length;
            const pct = total === 0 ? 0 : Math.round((checked / total) * 100);
            document.getElementById('progress-val').innerText = `${pct}%`;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        }

        // --- LINE 複製功能 ---
        function copyToLINE() {
            if (appState.shoppingItems.length === 0) return;

            const personaMap = { daily: "🏠 主婦日常", fitness: "💪 增肌減脂", party: "🥳 派對準備" };
            const personaName = personaMap[appState.currentPersona];
            const people = appState.peopleCount;

            let text = `🥦 *AI 冰友：生活提案採買清單* 🥦\n\n`;
            text += `📍 提案情境：${personaName}\n`;
            text += `👥 備餐人數：${people} 人份\n`;
            text += `──────────────────\n\n`;

            appState.shoppingItems.forEach((item) => {
                const status = item.checked ? "✅ [已放入購物車]" : "🛒 [待採買]";
                const urgencyEmoji = item.urgent > 80 ? "🔥" : "⏳";
                const categoryEmoji = item.category.includes("蛋白") ? "🥩" : item.category.includes("蔬") ? "🥬" : "📦";
                
                text += `${status}\n`;
                text += `${categoryEmoji} *${item.name}* (急迫性 ${urgencyEmoji}${item.urgent}%)\n`;
                text += `💡 補貨原因：${item.reason}\n\n`;
            });

            text += `──────────────────\n`;
            text += `✨ 由 AI 冰友為您智能分析 ✨`;

            navigator.clipboard.writeText(text).then(() => {
                showToast("清單已按 LINE 格式複製！", "💬");
            });
        }

        function showToast(msg, icon) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = icon || "✨";
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }
    </script>
</body>
</html>
